# apphosting.yaml
# Configuración de Firebase App Hosting (Cloud Run)
# Documentación: https://firebase.google.com/docs/app-hosting/configure

# ── Configuración del servidor Cloud Run ──────────────────────────────────────
runConfig:
  minInstances: 0        # Escala a 0 en inactividad (ahorra costos)
  maxInstances: 10       # Límite máximo de instancias concurrentes
  concurrency: 80        # Peticiones concurrentes por instancia
  cpu: 1
  memoryMiB: 512

# ── Variables de entorno y secretos ──────────────────────────────────────────
# IMPORTANTE: Los secretos con `secret:` se leen desde Cloud Secret Manager.
# Para crearlos: gcloud secrets create MY_SECRET --data-file=./secret.txt
env:
  # ── Firebase Client SDK (Públicas — disponibles en BUILD y RUNTIME) ─────────
  - variable: NUXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyCH6fRf6dozuoHQBZ9yRce-8BgbluaWjNk"
    availability:
      - BUILD
      - RUNTIME

  - variable: NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "clowpen2.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NUXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "clowpen2"
    availability:
      - BUILD
      - RUNTIME

  - variable: NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "clowpen2.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "898933247478"
    availability:
      - BUILD
      - RUNTIME

  - variable: NUXT_PUBLIC_FIREBASE_APP_ID
    value: "1:898933247478:web:d910f621ac01c21b048bd7"
    availability:
      - BUILD
      - RUNTIME

  - variable: NUXT_PUBLIC_APP_ENV
    value: "production"
    availability:
      - BUILD
      - RUNTIME

  # ── Firebase Admin SDK (Secretos — solo RUNTIME) ────────────────────────────
  # Crea el secreto: gcloud secrets create FIREBASE_ADMIN_PROJECT_ID --data-file=-
  - variable: FIREBASE_ADMIN_PROJECT_ID
    value: "clowpen2"               # No es secreto, pero lo mantenemos aquí
    availability:
      - RUNTIME

  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_ADMIN_CLIENT_EMAIL    # Nombre del secreto en Cloud Secret Manager
    availability:
      - RUNTIME

  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY     # La clave privada completa (incluye \n)
    availability:
      - RUNTIME

  # ── Google Gemini ───────────────────────────────────────────────────────────
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME

  # ── ePayco ─────────────────────────────────────────────────────────────────
  - variable: EPAYCO_PUBLIC_KEY
    secret: EPAYCO_PUBLIC_KEY
    availability:
      - RUNTIME

  - variable: EPAYCO_PRIVATE_KEY
    secret: EPAYCO_PRIVATE_KEY
    availability:
      - RUNTIME

  - variable: EPAYCO_SECRET_KEY
    secret: EPAYCO_SECRET_KEY
    availability:
      - RUNTIME

  - variable: EPAYCO_IS_TEST
    value: "false"                         # Cambiar a false en producción
    availability:
      - RUNTIME

  # ── Google OAuth2 (Calendar API) ────────────────────────────────────────
  # Crear: gcloud secrets create GOOGLE_CLIENT_ID --data-file=-
  # Crear: gcloud secrets create GOOGLE_CLIENT_SECRET --data-file=-
  - variable: NUXT_GOOGLE_CLIENT_ID
    secret: GOOGLE_CLIENT_ID
    availability:
      - RUNTIME

  - variable: NUXT_GOOGLE_CLIENT_SECRET
    secret: GOOGLE_CLIENT_SECRET
    availability:
      - RUNTIME

  # ── URL pública de la app ─────────────────────────────────────────────
  - variable: NUXT_PUBLIC_APP_URL
    value: "https://tu-dominio.web.app"
    availability:
      - BUILD
      - RUNTIME

  # ── Agentes: cifrado de tokens y firma de webhooks ──────────────────────
  # Crear: gcloud secrets create AGENT_TOKEN_ENCRYPTION_KEY --data-file=-
  # El valor debe ser exactamente 32 caracteres (256 bits)
  - variable: NUXT_AGENT_TOKEN_ENCRYPTION_KEY
    secret: AGENT_TOKEN_ENCRYPTION_KEY
    availability:
      - RUNTIME

  - variable: NUXT_WEBHOOK_SIGNING_KEY
    secret: WEBHOOK_SIGNING_KEY
    availability:
      - RUNTIME
